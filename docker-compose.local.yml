services:
  auth_api:
    build:
      context: .
      dockerfile: local.Dockerfile
    container_name: auth_api
    ports:
      - "8000:8000"
    env_file:
      .env
    volumes:
      - ./alembic:/app/alembic
    networks:
      - auth
    depends_on:
      auth_db:
        condition: service_healthy
    restart: unless-stopped

  auth_db:
    image: postgres:17.4
    container_name: auth_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - auth
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth_redis:
    image: redis:7
    container_name: auth_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - auth
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  pg_data:

networks:
  auth:
    driver: bridge